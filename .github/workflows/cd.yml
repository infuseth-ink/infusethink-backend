name: CD

on:
  workflow_dispatch: # TODO: remove after testing
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Compute short SHA
        id: sha
        env:
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          SHA="${WORKFLOW_RUN_SHA:-$(git rev-parse HEAD)}"
          echo "short=${SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Log in to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          IMAGE: ${{ steps.ecr.outputs.registry }}/infusethink-backend-staging:${{ steps.sha.outputs.short }}
          IMAGE_LATEST: ${{ steps.ecr.outputs.registry }}/infusethink-backend-staging:latest
        run: |
          docker build --build-arg GIT_SHA=${{ steps.sha.outputs.short }} \
            -t "$IMAGE" -t "$IMAGE_LATEST" .
          docker push "$IMAGE"
          docker push "$IMAGE_LATEST"

      - name: Resolve staging instance ID
        id: instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=infusethink-backend-staging" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)
          if [[ "$INSTANCE_ID" == "None" || -z "$INSTANCE_ID" ]]; then
            echo "No running staging instance found" >&2
            exit 1
          fi
          echo "id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSM
        id: ssm
        env:
          IMAGE: ${{ steps.ecr.outputs.registry }}/infusethink-backend-staging:${{ steps.sha.outputs.short }}
          SHORT_SHA: ${{ steps.sha.outputs.short }}
          INSTANCE_ID: ${{ steps.instance.outputs.id }}
          REGION: ap-southeast-1
          SECRET_ID: infusethink/staging/database-url
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --region "$REGION" \
            --parameters "commands=[
              'set -euo pipefail',
              'DATABASE_URL=\$(aws secretsmanager get-secret-value --region $REGION --secret-id $SECRET_ID --query SecretString --output text)',
              'aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin ${{ steps.ecr.outputs.registry }}',
              'docker pull $IMAGE',
              'docker run --rm -e DATABASE_URL=\"\$DATABASE_URL\" $IMAGE alembic upgrade head',
              'docker stop backend || true',
              'docker rm backend || true',
              'docker run -d --name backend --restart unless-stopped -e DATABASE_URL=\"\$DATABASE_URL\" -e GIT_SHA=$SHORT_SHA -p 127.0.0.1:8000:8000 $IMAGE'
            ]" \
            --query "Command.CommandId" \
            --output text)
          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for SSM command to complete
        env:
          COMMAND_ID: ${{ steps.ssm.outputs.command_id }}
          INSTANCE_ID: ${{ steps.instance.outputs.id }}
          REGION: ap-southeast-1
        run: |
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --region "$REGION" \
              --query "Status" \
              --output text)
            echo "[$i/30] SSM status: $STATUS"
            case "$STATUS" in
              Success)
                echo "Deploy succeeded."
                exit 0
                ;;
              Failed|Cancelled|TimedOut|Undeliverable|Terminated)
                echo "Deploy failed with status: $STATUS" >&2
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --region "$REGION" \
                  --query "StandardErrorContent" \
                  --output text >&2
                exit 1
                ;;
            esac
            sleep 10
          done
          echo "Timed out waiting for SSM command." >&2
          exit 1
