services:
  postgres:
    image: postgres:17.6
    container_name: infusethink-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: infusethink_local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d infusethink_local"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
