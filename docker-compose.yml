services:
  postgres:
    image: postgres:18.3
    container_name: infusethink-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: infusethink_local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER:-postgres}\" -d \"$${POSTGRES_DB:-infusethink_local}\""]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
